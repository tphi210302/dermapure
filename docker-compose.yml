services:
  mongodb:
    image: mongo:7-jammy
    container_name: pharma-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - pharma-network

  backend:
    build: ./backend
    container_name: pharma-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      NODE_ENV:              ${NODE_ENV:-development}
      PORT:                  5000
      MONGO_URI:             ${MONGO_URI:-mongodb://mongodb:27017/pharma-shop}
      JWT_SECRET:            ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      JWT_EXPIRES_IN:        ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET:    ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      RATE_LIMIT_WINDOW_MS:  ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX:        ${RATE_LIMIT_MAX:-1000}
      CLIENT_ORIGIN:         ${CLIENT_ORIGIN:-http://localhost:3000,http://localhost:3001}
      SEED_ADMIN_EMAIL:      ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD:   ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required}
    ports:
      - "5000:5000"
    networks:
      - pharma-network

  frontend:
    build: ./frontend
    container_name: pharma-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    networks:
      - pharma-network

volumes:
  mongo_data:

networks:
  pharma-network:
    driver: bridge
