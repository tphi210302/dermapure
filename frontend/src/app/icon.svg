<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
  </defs>

  <!-- Deep rose rounded square -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Italic serif L — monogram style -->
  <text x="32" y="46"
        text-anchor="middle"
        font-family="'Playfair Display', 'Cormorant Garamond', 'Times New Roman', Georgia, serif"
        font-size="44"
        font-weight="700"
        font-style="italic"
        fill="#fef3c7"
        letter-spacing="-1">L</text>

  <!-- Tiny dot accent — feminine touch -->
  <circle cx="44" cy="44" r="2" fill="#fef3c7" opacity="0.8"/>
</svg>
